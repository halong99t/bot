version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ctb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ctb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ctb_secret}
      POSTGRES_DB: ${POSTGRES_DB:-crypto_bot}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ctb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ctb_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-ctb}:${POSTGRES_PASSWORD:-ctb_secret}@postgres:5432/${POSTGRES_DB:-crypto_bot}?schema=public
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
      BINANCE_TESTNET: ${BINANCE_TESTNET:-true}
      SCAN_INTERVAL_MS: ${SCAN_INTERVAL_MS:-60000}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
    ports:
      - "4000:4000"
    command: sh -c "npx prisma migrate deploy && node dist/index.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:4000}
    container_name: ctb_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
